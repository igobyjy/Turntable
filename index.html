<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策转盘</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 基础变量 */
            --bg-color: #fff0f3;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #ff6b81;
            --dot-color: rgba(255, 107, 129, 0.1);
            --border-style: 4px solid #2d3436;
            --anime-shadow: 8px 8px 0px #2d3436;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #2d2d2d;
                --text-color: #f5f6fa;
                --accent-color: #fab1a0;
                --dot-color: rgba(255, 255, 255, 0.05);
                --border-style: 4px solid #f5f6fa;
                --anime-shadow: 8px 8px 0px #111;
            }
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'ZCOOL KuaiLe', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 480px;
            background-color: var(--card-bg);
            background-image: radial-gradient(var(--dot-color) 20%, transparent 20%);
            background-size: 20px 20px;
            padding: 25px;
            border: var(--border-style);
            border-radius: 25px;
            box-shadow: var(--anime-shadow);
            text-align: center;
        }

        /* --- 新增：配置管理区域样式 --- */
        .config-manager {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--text-color);
        }
        
        .manager-row {
            display: flex;
            gap: 8px;
        }

        select, input[type="text"] {
            font-family: 'ZCOOL KuaiLe', cursive;
            padding: 8px;
            border: 2px solid var(--text-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            flex: 1;
        }

        /* --- 按钮样式 --- */
        button {
            font-family: 'ZCOOL KuaiLe', cursive;
            cursor: pointer;
            border: 3px solid var(--text-color);
            border-radius: 12px;
            transition: all 0.1s;
        }

        .btn-main {
            background-color: var(--accent-color);
            color: white;
            padding: 12px;
            font-size: 1.2rem;
            box-shadow: 4px 4px 0px var(--text-color);
            width: 100%;
        }

        .btn-sub {
            background-color: transparent;
            color: var(--text-color);
            padding: 5px 15px;
            font-size: 0.9rem;
            border-width: 2px;
        }

        .btn-del {
            background-color: #ff4757;
            color: white;
            border-width: 2px;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--text-color);
        }

        /* --- 转盘与显示区域 --- */
        .wheel-box {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 15px auto;
        }

        #wheelCanvas {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: var(--border-style);
            background: #fff;
        }

        #pointer {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%);
            font-size: 35px; color: var(--accent-color);
            z-index: 10;
            filter: drop-shadow(2px 2px 0px var(--text-color));
        }

        textarea {
            width: 100%; height: 80px;
            padding: 10px; margin: 15px 0;
            border: 3px solid var(--text-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-color);
            font-family: inherit;
            resize: none;
        }

        #resultText {
            font-size: 1.2rem; min-height: 1.5em;
            color: var(--accent-color);
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ 命运之轮 ✨</h1>
    
    <div class="config-manager">
        <div class="manager-row">
            <select id="setSelector"></select>
            <button id="delBtn" class="btn-sub btn-del">删除</button>
        </div>
        <div class="manager-row">
            <input type="text" id="setNameInput" placeholder="新配置名称...">
            <button id="saveBtn" class="btn-sub">保存/新建</button>
        </div>
    </div>

    <div class="wheel-box">
        <div id="pointer">▼</div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div id="resultText">准备好接受启示了吗？</div>

    <textarea id="optionsInput" placeholder="每行输入一个选项..."></textarea>
    
    <button id="spinBtn" class="btn-main">召唤命运旋转！</button>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const setSelector = document.getElementById('setSelector');
    const setNameInput = document.getElementById('setNameInput');
    const optionsInput = document.getElementById('optionsInput');
    const resultText = document.getElementById('resultText');
    const tickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

    // 1. 初始化数据结构：{"配置名": ["选项1", "选项2"]}
    let allSets = {
        "默认菜单": ["吃拉面", "睡大觉", "打游戏", "写代码", "补番", "去运动"],
        "真心话": ["初恋是谁", "最近一次撒谎", "手机最后一张照片", "最讨厌的人"]
    };
    let currentSetName = "默认菜单";
    let currentRotation = 0;
    let isSpinning = false;
    let lastSegmentIndex = -1;

    // 2. 加载本地数据
    function init() {
        const saved = localStorage.getItem('animeWheelProData');
        if (saved) {
            allSets = JSON.parse(saved);
        }
        updateSelector();
        loadSet(Object.keys(allSets)[0]);
    }

    // 更新下拉菜单列表
    function updateSelector() {
        setSelector.innerHTML = "";
        Object.keys(allSets).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            setSelector.appendChild(opt);
        });
        setSelector.value = currentSetName;
    }

    // 切换当前显示的配置内容
    function loadSet(name) {
        if (!allSets[name]) return;
        currentSetName = name;
        setNameInput.value = name;
        optionsInput.value = allSets[name].join('\n');
        drawWheel();
    }

    // 绘制转盘
    function drawWheel() {
        const options = allSets[currentSetName];
        const n = options.length;
        const arc = (2 * Math.PI) / n;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        options.forEach((text, i) => {
            const angle = currentRotation + i * arc;
            ctx.fillStyle = `hsl(${i * (360 / n)}, 80%, 75%)`;
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#2d3436";
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = "#2d3436";
            ctx.font = "bold 24px 'ZCOOL KuaiLe'";
            ctx.textAlign = "right";
            ctx.fillText(text.substring(0, 8), 220, 10); // 截断过长文字
            ctx.restore();
        });
    }

    // --- 事件监听 ---

    // 切换配置
    setSelector.onchange = (e) => loadSet(e.target.value);

    // 保存/新建配置
    document.getElementById('saveBtn').onclick = () => {
        const name = setNameInput.value.trim();
        const items = optionsInput.value.split('\n').map(s => s.trim()).filter(s => s !== "");
        
        if (!name) return alert("给这个配置起个名字吧！");
        if (items.length < 2) return alert("至少需要两个选项哦！");

        allSets[name] = items;
        currentSetName = name;
        localStorage.setItem('animeWheelProData', JSON.stringify(allSets));
        updateSelector();
        drawWheel();
        alert(`✨ 『${name}』已同步至次元库！`);
    };

    // 删除配置
    document.getElementById('delBtn').onclick = () => {
        const keys = Object.keys(allSets);
        if (keys.length <= 1) return alert("这是最后一个配置了，留着它吧！");
        if (confirm(`确定要抹除『${currentSetName}』的记忆吗？`)) {
            delete allSets[currentSetName];
            currentSetName = Object.keys(allSets)[0];
            localStorage.setItem('animeWheelProData', JSON.stringify(allSets));
            init();
        }
    };

    // 旋转逻辑
    document.getElementById('spinBtn').onclick = () => {
        if (isSpinning) return;
        tickSound.play().then(() => tickSound.pause()).catch(() => {});

        isSpinning = true;
        resultText.innerText = "🔮 命运流转中...";
        const options = allSets[currentSetName];
        const extraSpins = Math.random() * 20 + 25;
        const duration = 4000;
        const startTimestamp = performance.now();
        const startRotation = currentRotation;

        function animate(now) {
            const elapsed = now - startTimestamp;
            const progress = Math.min(elapsed / duration, 1);
            const easing = 1 - Math.pow(1 - progress, 3);
            currentRotation = startRotation + easing * extraSpins;
            drawWheel();

            const arc = (2 * Math.PI) / options.length;
            const normalizedRotation = (currentRotation + Math.PI / 2) % (2 * Math.PI);
            const currentIdx = Math.floor((2 * Math.PI - normalizedRotation + (2 * Math.PI)) % (2 * Math.PI) / arc);

            if (currentIdx !== lastSegmentIndex) {
                tickSound.currentTime = 0;
                tickSound.play().catch(() => {});
                lastSegmentIndex = currentIdx;
            }

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                resultText.innerText = `✨ 结果是：【${options[currentIdx % options.length]}】`;
            }
        }
        requestAnimationFrame(animate);
    };

    init();
</script>
</body>
</html>
